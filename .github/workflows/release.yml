name: Release
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Build app bundle
        run: SQUAT_COACH_VERSION="${GITHUB_REF_NAME#v}" ./build.sh
      - name: Zip
        run: ditto -c -k --keepParent "/Applications/Squat Coach.app" "Squat-Coach-${GITHUB_REF_NAME#v}.zip"
      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" "Squat-Coach-${GITHUB_REF_NAME#v}.zip" \
            --title "Squat Coach $GITHUB_REF_NAME" --generate-notes \
            --notes "**Install:** unzip, drag Squat Coach.app into /Applications, then run \`xattr -dr com.apple.quarantine \"/Applications/Squat Coach.app\"\` (the app is not notarized). Building from source avoids this — see the README."

      # Bumps the Homebrew tap so `brew upgrade` serves this release.
      # Auth: an SSH deploy key scoped to the brianyoungilcho/homebrew-tap repo
      # (write access), stored as the HOMEBREW_TAP_DEPLOY_KEY secret. A deploy
      # key is repo-scoped (unlike a broad PAT) and is creatable entirely from
      # the CLI — no web UI. Re-create with:
      #   ssh-keygen -t ed25519 -f tapkey -N "" -C squat-coach-tap-autobump
      #   gh repo deploy-key add tapkey.pub --repo brianyoungilcho/homebrew-tap --title "squat-coach release auto-bump" --allow-write
      #   gh secret set HOMEBREW_TAP_DEPLOY_KEY --repo brianyoungilcho/squat-coach < tapkey
      - name: Update Homebrew tap
        env:
          TAP_DEPLOY_KEY: ${{ secrets.HOMEBREW_TAP_DEPLOY_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${TAP_DEPLOY_KEY:-}" ]; then
            echo "::warning::HOMEBREW_TAP_DEPLOY_KEY is not set — the GitHub release was published but the Homebrew tap was NOT bumped. Add the deploy-key secret to enable auto-bump; until then bump the tap manually. Skipping (release itself succeeded)." >&2
            exit 0
          fi
          VERSION="${GITHUB_REF_NAME#v}"
          SHA="$(shasum -a 256 "Squat-Coach-${VERSION}.zip" | awk '{print $1}')"
          echo "Bumping tap to ${VERSION} (sha256 ${SHA})"

          mkdir -p ~/.ssh
          printf '%s\n' "$TAP_DEPLOY_KEY" > ~/.ssh/tap_deploy_key
          chmod 600 ~/.ssh/tap_deploy_key
          export GIT_SSH_COMMAND="ssh -i ~/.ssh/tap_deploy_key -o IdentitiesOnly=yes -o StrictHostKeyChecking=accept-new"
          git clone --depth 1 git@github.com:brianyoungilcho/homebrew-tap.git tap
          CASK="tap/Casks/squat-coach.rb"
          # Only the top-level `version` and `sha256` lines change; the url
          # interpolates #{version} so it needs no edit.
          sed -i '' -E "s/^  version \".*\"/  version \"${VERSION}\"/" "$CASK"
          sed -i '' -E "s/^  sha256 \".*\"/  sha256 \"${SHA}\"/" "$CASK"

          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Casks/squat-coach.rb
          if git diff --cached --quiet; then
            echo "Cask already at ${VERSION}; nothing to commit."
          else
            git commit -m "squat-coach ${VERSION}"
            git push
          fi
